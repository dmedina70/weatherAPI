<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./styles.css">
  <title>Weather Forecast Dashboard</title>
</head>
<body>
  <main class="page-shell">
    <section class="hero-card">
      <p class="eyebrow">Weather Dashboard</p>
      <h1>Check the forecast before you head out</h1>
      <p class="hero-copy">
        Search by city and state to view the next 5 forecast updates with temperature,
        feels-like conditions, and sky details.
      </p>

      <div class="search-card">
        <div class="input-group">
          <label for="cityInput">City</label>
          <input type="text" id="cityInput" placeholder="Enter city name" />
        </div>

        <div class="input-group">
          <label for="stateInput">State</label>
          <input type="text" id="stateInput" placeholder="Enter state" />
        </div>

        <button id="search_button">Get Forecast</button>
      </div>

      <div id="status" aria-live="polite"></div>
    </section>

    <section id="result" class="results-panel" aria-live="polite">
      <div class="empty-state">
        <div class="empty-icon">⛅</div>
        <h2>No forecast yet</h2>
        <p>Search for a city to load weather details here.</p>
      </div>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
